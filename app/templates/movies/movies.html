{% extends 'base.html' %}{% block content %}<div class="d-flex justify-content-between align-items-center mb-3"><h1>Filmes</h1></div><form class="row g-2 mb-4"><div class="col-md-6"><input name="q" value="{{ query }}" class="form-control" placeholder="Buscar por nome"></div><div class="col-md-4"><select name="genre" class="form-select"><option value="">Todos os gêneros</option>{% for g in genres %}<option value="{{ g }}" {% if g==genre %}selected{% endif %}>{{ g }}</option>{% endfor %}</select></div><div class="col-md-2"><button class="btn btn-primary w-100">Buscar</button></div></form><div class="row g-4">{% for movie in movies %}<div class="col-lg-3 col-md-4"><div class="card h-100"><img class="card-img-top movie-poster" src="{{ movie.poster_url }}"><div class="card-body d-flex flex-column"><h5>{{ movie.title }}</h5><p class="text-muted small">{{ movie.genre }} - {{ movie.year }}</p><p class="small">Aluguel {{ movie.rent_price|brl }} | Compra {{ movie.buy_price|brl }}</p><a href="{{ url_for('movies.movie_detail', movie_id=movie.id) }}" class="btn btn-primary mt-auto">Detalhes</a></div></div></div>{% endfor %}</div>{% endblock %}
