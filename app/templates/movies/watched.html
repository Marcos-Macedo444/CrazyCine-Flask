{% extends 'base.html' %}{% block content %}<h1>Filmes assistidos</h1><div class="row g-3">{% for item in watched_items %}<div class="col-md-3"><div class="card h-100"><img src="{{ item.movie.poster_url }}" class="card-img-top small-poster"><div class="card-body"><h5>{{ item.movie.title }}</h5></div></div></div>{% else %}<p>Nenhum filme assistido ainda.</p>{% endfor %}</div>{% endblock %}
