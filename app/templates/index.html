{% extends 'base.html' %}{% block content %}<section class="hero mb-4"><div class="row align-items-center"><div class="col-md-8"><h1 class="display-5 fw-bold">CrazyCine</h1><p class="lead">Visualize, organize, alugue e compre filmes em uma plataforma simples, moderna e centralizada.</p><a class="btn btn-light btn-lg" href="{{ url_for('auth.register') }}">Começar agora</a></div><div class="col-md-4 text-center fs-1">🍿🎥</div></div></section><h2 class="h4 mb-3">Destaques</h2><div class="row g-3">{% for movie in destaques %}<div class="col-md-3"><div class="card h-100"><img src="{{ movie.poster_url }}" class="card-img-top small-poster"><div class="card-body"><h5>{{ movie.title }}</h5><p class="text-muted small">{{ movie.genre }} - {{ movie.year }}</p></div></div></div>{% endfor %}</div>{% endblock %}
