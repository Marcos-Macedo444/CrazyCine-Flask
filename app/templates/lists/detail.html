{% extends 'base.html' %}{% block content %}<h1>{{ movie_list.name }}</h1><div class="row g-3">{% for movie in movie_list.movies %}<div class="col-md-3"><div class="card h-100"><img src="{{ movie.poster_url }}" class="card-img-top small-poster"><div class="card-body"><h5>{{ movie.title }}</h5><a href="{{ url_for('movies.movie_detail', movie_id=movie.id) }}" class="btn btn-sm btn-primary">Ver</a><form method="post" action="{{ url_for('lists.remove_from_list', list_id=movie_list.id, movie_id=movie.id) }}" class="mt-2"><button class="btn btn-sm btn-outline-danger">Remover</button></form></div></div></div>{% else %}<p>Lista vazia.</p>{% endfor %}</div>{% endblock %}
